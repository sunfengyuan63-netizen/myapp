  <script type="module" data-node-id="b75057c2-29b2-11f1-be13-122a9cb60781">
    import { supabase } from './js/supabase.js';
    import { checkAuth, getCurrentUser } from './js/auth.js';
    
    // 全局状态
    let currentUser = null;
    let isManager = false;
    let previewData = [];
    let checklistTypes = {};
    let branchMappings = {};
    
    // DOM 元素
    const loadingOverlay = document.getElementById('loadingOverlay');
    const toastContainer = document.getElementById('toastContainer');
    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const previewSection = document.getElementById('previewSection');
    const previewBody = document.getElementById('previewBody');
    const planDateInput = document.getElementById('planDate');
    
    // 初始化
    async function init() {
      const session = await checkAuth();
      if (!session) {
        window.location.href = './index.html';
        return;
      }
      
      currentUser = await getCurrentUser();
      if (!currentUser) {
        window.location.href = './index.html';
        return;
      }
      
      isManager = currentUser.isManager || currentUser.roleType === 'manager';
      
      // 非管理员跳转到我的任务页面
      if (!isManager) {
        window.location.href = './my-daily-tasks.html';
        return;
      }
      
      document.getElementById('userInfo').textContent = currentUser.profile?.display_name || '';
      
      // 设置默认日期为今天
      const today = new Date().toISOString().split('T')[0];
      planDateInput.value = today;
      document.getElementById('todayDate').textContent = formatDate(today);
      document.getElementById('historyDateFrom').value = today;
      document.getElementById('historyDateTo').value = today;
      
      // 加载清单类型和映射
      await loadChecklistTypes();
      await loadBranchMappings();
      
      // 加载当日任务
      await loadTodayTasks();
      
      setupEventListeners();
    }
    
    init();
    
    // 加载清单类型
    async function loadChecklistTypes() {
      const { data } = await supabase
        .from('checklist_types')
        .select('*')
        .order('sort_order');
      
      if (data) {
        data.forEach(t => {
          checklistTypes[t.id] = t;
        });
      }
    }
    
    // 加载分公司映射
    async function loadBranchMappings() {
      const { data } = await supabase
        .from('branch_checklist_mapping')
        .select('*');
      
      if (data) {
        data.forEach(m => {
          branchMappings[m.branch_name] = m.checklist_type_id;
        });
      }
    }
    
    // 根据分公司名称匹配清单类型
    function matchChecklistType(branchName) {
      // 精确匹配
      if (branchMappings[branchName]) {
        return branchMappings[branchName];
      }
      
      // 模糊匹配
      if (branchName.includes('输电')) {
        return Object.keys(checklistTypes).find(id => checklistTypes[id].code === 'transmission');
      }
      
      if (branchName.includes('变电') || branchName.includes('建筑') || 
          branchName.includes('调试') || branchName.includes('抢修')) {
        return Object.keys(checklistTypes).find(id => checklistTypes[id].code === 'substation');
      }
      
      // 默认返回输电清单
      return Object.keys(checklistTypes).find(id => checklistTypes[id].code === 'transmission');
    }
    
    // 设置事件监听
    function setupEventListeners() {
      // 标签页切换
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const tab = btn.dataset.tab;
          switchTab(tab);
        });
      });
      
      // 文件上传
      uploadArea.addEventListener('click', () => fileInput.click());
      uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
      });
      uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('dragover');
      });
      uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          handleFile(files[0]);
        }
      });
      
      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
          handleFile(e.target.files[0]);
        }
      });
      
      // 下载模板
      document.getElementById('downloadTemplate').addEventListener('click', downloadTemplate);
      
      // 取消导入
      document.getElementById('cancelImport').addEventListener('click', () => {
        previewData = [];
        previewSection.classList.add('hidden');
        fileInput.value = '';
      });
      
      // 确认导入
      document.getElementById('confirmImport').addEventListener('click', confirmImport);
      
      // 查询历史
      document.getElementById('searchHistory').addEventListener('click', loadHistory);

      // 管理员端弹窗事件绑定
      const adminModal = document.getElementById('adminStartTaskModal');
      const adminCompanySelect = document.getElementById('adminModalCompanySelect');
      const adminConfirmBtn = document.getElementById('adminConfirmStartBtn');
      const adminCloseBtn = document.getElementById('adminCloseModalBtn');
      const adminCancelBtn = document.getElementById('adminCancelModalBtn');

      // 公司选择变化
      adminCompanySelect.addEventListener('change', onAdminModalCompanyChange);
      // 确认按钮
      adminConfirmBtn.addEventListener('click', confirmAdminStartTask);
      // 关闭按钮
      if (adminCloseBtn) adminCloseBtn.addEventListener('click', closeAdminStartModal);
      if (adminCancelBtn) adminCancelBtn.addEventListener('click', closeAdminStartModal);
      // 点击背景关闭
      adminModal.addEventListener('click', (e) => {
        if (e.target === adminModal) closeAdminStartModal();
      });
    }
    
    // 切换标签页
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });
      document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.toggle('active', content.id === `${tab}Tab`);
      });
      
      if (tab === 'today') {
        loadTodayTasks();
      }
    }
    
    // 处理文件
    async function handleFile(file) {
      if (!file.name.match(/\.(xlsx|xls)$/i)) {
        showToast('请上传Excel文件（.xlsx或.xls格式）', 'error');
        return;
      }
      
      setLoading(true);
      
      try {
        const data = await readExcelFile(file);
        if (data.length === 0) {
          showToast('文件中没有有效数据', 'error');
          return;
        }
        
        // 解析数据
        previewData = parseExcelData(data);
        
        if (previewData.length === 0) {
          showToast('未找到有效的日计划数据，请检查文件格式', 'error');
          return;
        }
        
        // 显示预览
        renderPreview();
        previewSection.classList.remove('hidden');
        
        showToast(`成功解析 ${previewData.length} 条记录`);
        
      } catch (error) {
        console.error('Parse error:', error);
        showToast('文件解析失败：' + error.message, 'error');
      } finally {
        setLoading(false);
      }
    }
    
    // 读取Excel文件
    function readExcelFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            // 使用 defval:'' 确保空单元格也填充空字符串，避免Z列等末尾列被截断
            const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });
            resolve(jsonData);
          } catch (err) {
            reject(err);
          }
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });
    }
    
    // 解析Excel数据
    // 支持两种模式：
    // 1. 标准模式：自动识别包含"项目实施单位"、"作业计划名称"、"工作负责人"的列
    // 2. 固定列模式：H列（项目实施单位→分公司）、T列（作业计划名称→项目名称）、Z列（工作负责人姓名）
    function parseExcelData(data) {
      const result = [];
      
      // 列索引转换函数（A=0, B=1, ..., Z=25, AA=26...）
      function colLetterToIndex(letter) {
        let index = 0;
        for (let i = 0; i < letter.length; i++) {
          index = index * 26 + (letter.charCodeAt(i) - 64);
        }
        return index - 1;
      }
      
      // 固定列位置（H=7, T=19, Z=25）
      const FIXED_BRANCH_COL = colLetterToIndex('H');      // H列 = 7（项目实施单位）
      const FIXED_PROJECT_COL = colLetterToIndex('T');     // T列 = 19（作业计划名称）
      const FIXED_SUPERVISOR_COL = colLetterToIndex('Z');  // Z列 = 25（工作负责人姓名）
      
      // 调试日志：打印前5行的Z列内容，方便调试
      console.log('[DEBUG] 前5行Z列(索引25)内容:');
      for (let i = 0; i < Math.min(5, data.length); i++) {
        const row = data[i];
        if (row) {
          console.log(`  行${i}: 长度=${row.length}, Z列内容="${row[FIXED_SUPERVISOR_COL]}", H列="${row[FIXED_BRANCH_COL]}", T列="${row[FIXED_PROJECT_COL]}"`);
        }
      }
      
      // 查找表头行和列
      let headerRow = -1;
      let branchCol = -1;
      let projectCol = -1;
      // 工作负责人列默认不设置，将在表头扫描后决定
      let supervisorCol = -1;
      
      // 首先尝试通过表头名称自动识别列位置
      // 工作负责人列：仅匹配精确等于"工作负责人"四个字，不多不少
      // 这样可避免匹配到"工作负责人资质不合格"等包含该关键词的内容列
      for (let i = 0; i < Math.min(15, data.length); i++) {
        const row = data[i];
        if (!row) continue;
        
        let rowHasHeader = false;
        for (let j = 0; j < row.length; j++) {
          const cell = String(row[j] || '').trim();
          
          // 匹配分公司列：优先"项目实施单位"，其次"分公司"、"施工单位"等
          if (cell === '项目实施单位' || cell.includes('项目实施单位')) {
            branchCol = j;
            rowHasHeader = true;
          } else if (branchCol < 0 && (cell.includes('分公司') || cell.includes('施工单位'))) {
            branchCol = j;
            rowHasHeader = true;
          }
          
          // 匹配项目列：优先"作业计划名称"，其次"项目名称"、"工程名称"等
          if (cell === '作业计划名称' || cell.includes('作业计划名称')) {
            projectCol = j;
            rowHasHeader = true;
          } else if (projectCol < 0 && (cell.includes('项目名称') || cell.includes('工程名称') || cell.includes('线路名称'))) {
            projectCol = j;
            rowHasHeader = true;
          }
          
          // 匹配负责人列：仅匹配精确等于"工作负责人"四个字，不多不少
          // 不使用 includes，避免匹配到"工作负责人资质不合格"等内容列
          if (cell === '工作负责人') {
            supervisorCol = j;
            rowHasHeader = true;
            console.log(`[DEBUG] 表头扫描: 在行${i}列${j}找到精确匹配"工作负责人"`);
          }
        }
        
        if (rowHasHeader) {
          headerRow = i;
        }
        
        if (branchCol >= 0 && projectCol >= 0 && supervisorCol >= 0) {
          break;
        }
      }
      
      // 工作负责人列处理：最高优先级使用Z列（第25列）
      // 无论表头扫描是否成功，工作负责人始终使用Z列
      // 原因：日计划Excel中工作负责人姓名固定在Z列（第25列）
      const maxCols = Math.max(...data.filter(r => r && r.length > 0).map(r => r.length));
      if (maxCols > FIXED_SUPERVISOR_COL) {
        // 数据有Z列，强制使用Z列作为工作负责人列
        if (supervisorCol !== FIXED_SUPERVISOR_COL) {
          console.log(`[DEBUG] 工作负责人列覆盖为Z列(索引25)，原匹配列=${supervisorCol === -1 ? '未找到' : supervisorCol}`);
          supervisorCol = FIXED_SUPERVISOR_COL;
        } else {
          console.log(`[DEBUG] 工作负责人列表头匹配结果与Z列一致，使用Z列(索引25)`);
        }
      } else if (supervisorCol < 0) {
        // 数据列数不够且表头未匹配，回退到默认列
        supervisorCol = 2;
        console.log('[DEBUG] 数据列数不足Z列，且表头未匹配，回退使用第3列');
      }
      
      // 如果分公司列或项目列自动识别失败，尝试使用固定列模式（H、T列）
      if (branchCol < 0 || projectCol < 0) {
        if (maxCols > FIXED_PROJECT_COL) {
          if (branchCol < 0) {
            branchCol = FIXED_BRANCH_COL;
            console.log('[DEBUG] 分公司列未匹配，回退使用H列(索引7)');
          }
          if (projectCol < 0) {
            projectCol = FIXED_PROJECT_COL;
            console.log('[DEBUG] 项目列未匹配，回退使用T列(索引19)');
          }
          
          // 重新查找表头行：通过H列或T列内容确认
          if (headerRow < 0) {
            for (let i = 0; i < Math.min(15, data.length); i++) {
              const row = data[i];
              if (!row) continue;
              const branchVal = String(row[FIXED_BRANCH_COL] || '').trim();
              const projectVal = String(row[FIXED_PROJECT_COL] || '').trim();
              if (branchVal.includes('项目实施单位') || branchVal.includes('分公司') || branchVal.includes('单位') ||
                  projectVal.includes('作业计划名称') || projectVal.includes('项目') || projectVal.includes('作业')) {
                headerRow = i;
                console.log(`[DEBUG] 固定列模式找到表头行: 行${i}`);
                break;
              }
            }
          }
        } else {
          // 列数不够，使用默认的前三列
          branchCol = branchCol >= 0 ? branchCol : 0;
          projectCol = projectCol >= 0 ? projectCol : 1;
        }
      }
      
      // 表头行未找到时默认为第0行
      if (headerRow < 0) {
        headerRow = 0;
        console.log('[DEBUG] 未找到表头行，默认使用第0行为表头');
      }
      
      console.log(`[DEBUG] 最终解析配置: 表头行=${headerRow}, 分公司列=${branchCol}(${branchCol===7?'H列':branchCol}), 项目列=${projectCol}(${projectCol===19?'T列':projectCol}), 工作负责人列=${supervisorCol}(${supervisorCol===25?'Z列[最高优先级]':supervisorCol})`);
      
      // 解析数据行
      for (let i = headerRow + 1; i < data.length; i++) {
        const row = data[i];
        if (!row) continue;
        
        // 确保行数组足够长（使用defval:''  后应该已经足够，但仍做保险处理）
        const branchName = String(row[branchCol] !== undefined ? row[branchCol] : '').trim();
        const projectName = String(row[projectCol] !== undefined ? row[projectCol] : '').trim();
        // Z列读取工作负责人姓名（最高优先级）
        const rawSupervisor = row[supervisorCol];
        const supervisorName = String(rawSupervisor !== undefined && rawSupervisor !== null ? rawSupervisor : '').trim();
        
        // 跳过空行
        if (!branchName && !projectName && !supervisorName) continue;
        
        // 跳过备注行、说明行、合计行等
        if (branchName.includes('备注') || branchName.includes('说明') || 
            branchName.includes('合计') || branchName.includes('总计') ||
            branchName.includes('序号') || branchName === '序') continue;
        
        // 跳过明显不是数据的行
        if (projectName.includes('备注') || projectName.includes('说明')) continue;
        
        const checklistTypeId = matchChecklistType(branchName);
        const checklistType = checklistTypes[checklistTypeId];
        
        result.push({
          branchName: branchName || '未知分公司',
          projectName: projectName || '未知项目',
          supervisorName: supervisorName || '未知负责人',
          checklistTypeId,
          checklistTypeName: checklistType?.name || '未知清单',
          checklistTypeCode: checklistType?.code || 'transmission'
        });
      }
      
      return result;
    }

    // 根据分公司名称自动匹配公司选项
    function adminAutoMatchCompany(branchName) {
      if (!branchName) return '';
      if (COMPANY_CHECKLIST_MAP[branchName]) return branchName;
      // 包含匹配
      for (const key of Object.keys(COMPANY_CHECKLIST_MAP)) {
        if (branchName === key) return key;
      }
      for (const key of Object.keys(COMPANY_CHECKLIST_MAP)) {
        if (branchName.includes(key) || key.includes(branchName)) return key;
      }
      // 关键词匹配
      if (branchName.includes('输电')) {
        if (branchName.includes('一')) return '输电第一分公司';
        if (branchName.includes('二')) return '输电第二分公司';
        if (branchName.includes('三')) return '输电第三分公司';
        return '输电第一分公司';
      }
      if (branchName.includes('变电')) {
        if (branchName.includes('一')) return '变电第一分公司';
        if (branchName.includes('二')) return '变电第二分公司';
        return '变电第一分公司';
      }
      if (branchName.includes('建筑')) return '建筑分公司';
      if (branchName.includes('调试')) return '调试分公司';
      if (branchName.includes('抢修') || branchName.includes('应急')) return '应急抢修中心';
      return '';
    }

    async function confirmAdminStartTask() {

      isAdminSubmitting = true;

      const confirmBtnIcon = document.getElementById('adminConfirmBtnIcon');

      if (confirmBtnIcon) confirmBtnIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>';

      setLoading(true);
      let taskCreated = false; // 标记是否成功创建任务（用于 finally 判断是否需要恢复按钮）

      try {
        const plan = pendingAdminPlanData;
        
        console.log('创建任务 - 公司:', company, '清单类型:', checklistInfo.code);

        // ★ 优先使用本地缓存的 checklist_type_id，避免数据库查询失败导致卡顿
        let checklistTypeId = null;
        let totalItems = checklistInfo.total;
        
        // 尝试从已加载的 checklistTypes 中获取
        const cachedType = Object.values(checklistTypes || {}).find(t => t.code === checklistInfo.code);
        if (cachedType) {
          checklistTypeId = cachedType.id;
          totalItems = cachedType.total_items || checklistInfo.total;
          console.log('使用缓存的清单类型:', checklistTypeId, '项数:', totalItems);
        } else {
          // 尝试查询数据库（带超时保护）
          try {
            const { data: ctData, error: ctError } = await supabase
              .from('checklist_types')
              .select('id, total_items')
              .eq('code', checklistInfo.code)
              .single();
            
            if (!ctError && ctData) {

          }
        }

        // 生成任务编号（带超时保护）
        let taskNumber;
        try {
          const { data: tnData, error: tnError } = await supabase.rpc('generate_task_number');
          if (tnError) throw new Error('生成任务编号失败：' + tnError.message);
          taskNumber = tnData;
        } catch (tnErr) {
          // 如果 RPC 失败，使用本地生成的编号
          console.warn('generate_task_number RPC 失败，使用本地编号:', tnErr.message);
          const now = new Date();
          taskNumber = `TASK-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${String(Math.floor(Math.random()*9000)+1000)}`;
        }
        
        console.log('任务编号:', taskNumber);

        // 创建检查任务
        const { data: task, error: taskError } = await supabase
          .from('inspection_tasks')
          .insert({
            task_number: taskNumber,
            inspector_name: plan.supervisor_name,
            company_name: company,
            project_name: plan.project_name,
            inspection_date: plan.plan_date,
            created_by: currentUser.id,
            status: 'draft',
            total_items: totalItems,
            checklist_type_id: checklistTypeId
          })
          .select('id')
          .single();

        if (taskError) {
          let errMsg = '创建检查任务失败';
          if (taskError.code === '42501') errMsg = '权限不足，请重新登录后重试';
          else if (taskError.code === '23503') errMsg = '数据关联错误，请联系管理员';
          else if (taskError.message) errMsg = taskError.message;
          throw new Error(errMsg);
        }
        if (!task || !task.id) throw new Error('创建任务后未能获取任务ID，请重试');
        
        console.log('任务创建成功:', task.id);
        taskCreated = true; // 标记成功

        // 更新日计划状态（不阻塞跳转）
        supabase
          .from('daily_plans')
          .update({ status: 'in_progress', task_id: task.id })
          .eq('id', plan.id)
          .then(({ error: updateErr }) => {
            if (updateErr) console.warn('更新日计划状态失败:', updateErr);
          });

        showToast('检查任务已创建，正在跳转...');
        document.getElementById('adminStartTaskModal').style.display = 'none';

        setTimeout(() => {
          window.location.href = `./inspection.html?id=${task.id}&type=${checklistInfo.code}`;
        }, 600);

      } catch (error) {
        console.error('Admin start task error:', error);
        const errMsg = error.message || '创建任务失败，请重试';
        if (modalError) {
          modalError.textContent = '错误：' + errMsg;
          modalError.classList.remove('hidden');
        }
        showToast(errMsg, 'error');
      } finally {
        setLoading(false);
        // ★ 关键修复：无论成功失败，都在 finally 中恢复状态
        // 只有在任务未成功创建时才恢复按钮（成功后会跳转，不需要恢复）
        if (!taskCreated) {
          isAdminSubmitting = false;
          if (confirmBtn) confirmBtn.disabled = false;
          if (confirmBtnText) confirmBtnText.textContent = '创建并开始检查';
          if (confirmBtnIcon) confirmBtnIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>';
        }
      }
    }

        // 查看任务
    window.viewTask = function(taskId) {
      window.location.href = `./inspection.html?id=${taskId}`;
    };
    
    // 取消计划
    window.cancelPlan = async function(planId) {
      if (!confirm('确定要取消此日计划吗？')) return;
      
      setLoading(true);
      
      try {
        const { error } = await supabase
          .from('daily_plans')
          .update({
            status: 'cancelled',
            updated_at: new Date().toISOString()
          })
          .eq('id', planId);
        
        if (error) throw error;
        
        showToast('日计划已取消');
        await loadTodayTasks();
        
      } catch (error) {
        console.error('Cancel error:', error);
        showToast('取消失败：' + error.message, 'error');
      } finally {
        setLoading(false);
      }
    };
    
    // 一键清除当日所有日计划
    window.clearTodayPlans = async function() {
      const today = new Date().toISOString().split('T')[0];
      
      if (!confirm(`确定要清除 ${today} 的所有日计划吗？\n\n此操作不可恢复，将删除当日全部日计划记录。`)) return;
      
      setLoading(true);
      
      try {
        // 删除当日所有日计划
        const { error } = await supabase
          .from('daily_plans')
          .delete()
          .eq('plan_date', today);
        
        if (error) throw error;
        
        showToast('当日日计划已全部清除');
        
        // 隐藏清除按钮
        document.getElementById('clearTodayBtn').classList.add('hidden');
        document.getElementById('todayCount').classList.add('hidden');
        
        // 刷新当日任务列表
        await loadTodayTasks();
        
      } catch (error) {
        console.error('Clear today plans error:', error);
        showToast('清除失败：' + error.message, 'error');
      } finally {
        setLoading(false);
      }
    };
    
    // 返回
    window.goBack = function() {
      window.location.href = './home.html';
    };
    
    // 辅助函数
    function getStatusText(status) {
      const map = {
        'pending': '待执行',
        'in_progress': '进行中',
        'completed': '已完成',
        'cancelled': '已取消'
      };
      return map[status] || status;
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }
    
    function formatDateTime(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return `${formatDate(dateStr)} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    }
    
    // Toast
    window.showToast = function(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        <span>${type === 'success' ? '✓' : type === 'error' ? '✕' : '⚠'}</span>
        <span>${message}</span>
      `;
      toastContainer.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    };
    
    // Loading
    window.setLoading = function(show) {
      loadingOverlay.classList.toggle('hidden', !show);
    };
  </script>
</body>
</html>
