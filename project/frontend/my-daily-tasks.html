  <style data-node-id="b75405ac-29b2-11f1-be13-122a9cb60781">
    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .task-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--primary);
    }
    
    .task-card.substation::before {
      background: var(--info);
    }
    
    .task-card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    
    .task-card.substation:hover {
      border-color: var(--info);
    }
    
    .checklist-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    
    .checklist-type-badge.transmission {
      background: linear-gradient(135deg, rgba(255, 107, 0, 0.15) 0%, rgba(255, 217, 61, 0.15) 100%);
      color: var(--primary);
      border: 1px solid rgba(255, 107, 0, 0.3);
    }
    
    .checklist-type-badge.substation {
      background: linear-gradient(135deg, rgba(52, 152, 219, 0.15) 0%, rgba(155, 89, 182, 0.15) 100%);
      color: var(--info);
      border: 1px solid rgba(52, 152, 219, 0.3);
    }
    
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    
    .status-indicator.pending {
      background: rgba(243, 156, 18, 0.15);
      color: var(--warning);
    }
    
    .status-indicator.in_progress {
      background: rgba(52, 152, 219, 0.15);
      color: var(--info);
    }
    
    .status-indicator.completed {
      background: rgba(46, 204, 113, 0.15);
      color: var(--success);
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    .status-dot.pending { background: var(--warning); }
    .status-dot.in_progress { background: var(--info); }
    .status-dot.completed { background: var(--success); }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .date-selector {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg-elevated);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    
    .date-nav-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    
    .date-nav-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    
    .supervisor-selector {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    
    .supervisor-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    
    .supervisor-chip {
      padding: 0.5rem 1rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.9rem;
    }
    
    .supervisor-chip:hover {
      border-color: var(--primary);
      background: rgba(255, 107, 0, 0.1);
    }
    
    .supervisor-chip.selected {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
    }
    
    .empty-state-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
      background: var(--bg-elevated);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 创建检查弹窗 - 使用独立样式避免与全局 modal-overlay 冲突 */
    #startTaskModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 1500;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #startTaskModal.modal-visible {
      display: flex;
    }
    .modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      z-index: 1501;
    }
    .checklist-hint {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      margin-top: 0.5rem;
      font-size: 0.875rem;
    }
    .checklist-hint.transmission-hint {
      border-color: rgba(255,107,0,0.4);
      background: rgba(255,107,0,0.06);
    }
    .checklist-hint.substation-hint {
      border-color: rgba(52,152,219,0.4);
      background: rgba(52,152,219,0.06);
    }

    /* 确保 select 下拉在弹窗内可正常点击 */
    #startTaskModal select,
    #startTaskModal input,
    #startTaskModal button {
      position: relative;
      z-index: 1502;
    }
  </style>

    <p class="text-secondary" data-node-id="b753dfdc-29b2-11f1-be13-122a9cb60781">处理中...</p>
  </div>

  <script type="module" data-node-id="b753ed60-29b2-11f1-be13-122a9cb60781">
    import { supabase } from './js/supabase.js';
    import { checkAuth, getCurrentUser } from './js/auth.js';
    
    // 全局状态
    let currentUser = null;
    let isManager = false;
    let selectedDate = new Date().toISOString().split('T')[0];
    let selectedSupervisor = null;
    let allSupervisors = [];
    // 当前待创建的日计划信息
    let pendingPlanData = null;
    // 防重复提交标志
    let isSubmitting = false;

    // 公司 -> 清单类型映射
    const COMPANY_CHECKLIST_MAP = {
      '输电第一分公司': { code: 'transmission', name: '输电组塔施工违章预判清单', total: 60 },
      '输电第二分公司': { code: 'transmission', name: '输电组塔施工违章预判清单', total: 60 },
      '输电第三分公司': { code: 'transmission', name: '输电组塔施工违章预判清单', total: 60 },
      '变电第一分公司': { code: 'substation', name: '变电工程违章预判清单', total: 33 },
      '变电第二分公司': { code: 'substation', name: '变电工程违章预判清单', total: 33 },
      '建筑分公司':     { code: 'substation', name: '变电工程违章预判清单', total: 33 },
      '调试分公司':     { code: 'substation', name: '变电工程违章预判清单', total: 33 },
      '应急抢修中心':   { code: 'substation', name: '变电工程违章预判清单', total: 33 },
    };
    
    // DOM 元素
    const loadingOverlay = document.getElementById('loadingOverlay');
    const toastContainer = document.getElementById('toastContainer');
    const dateInput = document.getElementById('selectedDate');
    const taskList = document.getElementById('taskList');
    const supervisorSelector = document.getElementById('supervisorSelector');
    const supervisorListEl = document.getElementById('supervisorList');
    const startTaskModal = document.getElementById('startTaskModal');
    const modalCompanySelect = document.getElementById('modalCompanySelect');
    const confirmStartBtn = document.getElementById('confirmStartBtn');
    const confirmStartBtnText = document.getElementById('confirmStartBtnText');
    
    // 初始化
    async function init() {
      const session = await checkAuth();
      if (!session) {
        window.location.href = './index.html';
        return;
      }
      
      currentUser = await getCurrentUser();
      if (!currentUser) {
        window.location.href = './index.html';
        return;
      }
      
      isManager = currentUser.isManager || currentUser.roleType === 'manager';
      
      // 设置日期
      dateInput.value = selectedDate;
      
      // 管理员显示负责人选择器
      if (isManager) {
        supervisorSelector.classList.remove('hidden');
        await loadSupervisors();
      } else {
        // 非管理员直接使用自己的名字
        selectedSupervisor = currentUser.profile?.display_name;
        await loadTasks();
      }
      
      setupEventListeners();
    }
    
    init();
    
    // 加载负责人列表
    async function loadSupervisors() {
      const { data: plans, error } = await supabase
        .from('daily_plans')
        .select('supervisor_name')
        .eq('plan_date', selectedDate);
      
      if (error) {
        console.error('Load supervisors error:', error);
        return;
      }
      
      // 去重
      const supervisors = [...new Set(plans?.map(p => p.supervisor_name) || [])];
      allSupervisors = supervisors;
      
      if (supervisors.length === 0) {
        supervisorListEl.innerHTML = `
          <div class="text-muted text-sm py-4">该日期暂无日计划数据</div>
        `;
        taskList.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">
              <svg class="w-16 h-16 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
              </svg>
            </div>
            <h3 class="text-xl font-semibold mb-2">暂无日计划</h3>
            <p class="text-secondary mb-4">该日期没有导入日计划数据</p>
            <a href="./daily-plan.html" class="btn btn-primary">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
              </svg>
              导入日计划
            </a>
          </div>
        `;
        return;
      }
      
      supervisorListEl.innerHTML = supervisors.map(name => `
        <button class="supervisor-chip ${selectedSupervisor === name ? 'selected' : ''}" 
                data-name="${escapeAttr(name)}">
          ${name}
        </button>
      `).join('');
      
      // 如果没有选中的负责人，显示提示
      if (!selectedSupervisor) {
        taskList.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">
              <svg class="w-16 h-16 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
              </svg>
            </div>
            <h3 class="text-xl font-semibold mb-2">请选择工作负责人</h3>
            <p class="text-secondary">点击上方的姓名查看该负责人的检查任务</p>
          </div>
        `;
      }
    }
    
    // 加载任务
    async function loadTasks() {
      if (!selectedSupervisor) return;
      
      setLoading(true);
      
      try {
        const { data: plans, error } = await supabase
          .from('daily_plans')
          .select(`
            *,
            checklist_types (id, name, code, total_items),
            inspection_tasks (id, status, completed_items, total_items, problem_items)
          `)
          .eq('plan_date', selectedDate)
          .eq('supervisor_name', selectedSupervisor)
          .order('created_at', { ascending: false });
        
        if (error) throw error;
        
        // 更新负责人信息
        document.getElementById('selectedSupervisorInfo').classList.remove('hidden');
        document.getElementById('supervisorName').textContent = selectedSupervisor;
        document.getElementById('taskDate').textContent = formatDate(selectedDate);
        document.getElementById('taskCount').textContent = `${plans?.length || 0} 项任务`;
        
        if (!plans || plans.length === 0) {
          taskList.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">
                <svg class="w-16 h-16 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                </svg>
              </div>
              <h3 class="text-xl font-semibold mb-2">暂无检查任务</h3>
              <p class="text-secondary">${selectedSupervisor} 在 ${formatDate(selectedDate)} 没有分配的检查任务</p>
            </div>
          `;
          return;
        }
        
        taskList.innerHTML = plans.map(plan => {
          const checklistType = plan.checklist_types;
          const task = plan.inspection_tasks;
          // 根据 branch_name 判断类型（日计划中的分公司名称）
          const branchName = plan.branch_name || '';
          const isTransmission = branchName.includes('输电') || (checklistType?.code === 'transmission');
          const cardClass = isTransmission ? 'transmission' : 'substation';
          const badgeClass = isTransmission ? 'transmission' : 'substation';
          const badgeIcon = isTransmission ? '⚡' : '🔌';
          const badgeName = checklistType?.name || (isTransmission ? '输电组塔施工违章预判清单' : '变电工程违章预判清单');
          const totalItems = checklistType?.total_items || (isTransmission ? 60 : 33);
          const taskTypeCode = checklistType?.code || (isTransmission ? 'transmission' : 'substation');

          return `
            <div class="task-card ${cardClass}">
              <div class="flex flex-col md:flex-row md:items-start justify-between gap-4">
                <div class="flex-1">
                  <div class="flex items-center gap-3 mb-3 flex-wrap">
                    <span class="checklist-type-badge ${badgeClass}">
                      ${badgeIcon}
                      ${badgeName}
                    </span>
                    <span class="status-indicator ${plan.status}">
                      <span class="status-dot ${plan.status}"></span>
                      ${getStatusText(plan.status)}
                    </span>
                  </div>
                  
                  <h3 class="text-lg font-semibold mb-2">${plan.project_name}</h3>
                  
                  <div class="grid grid-cols-2 gap-4 text-sm">
                    <div>
                      <span class="text-muted">项目实施单位：</span>
                      <span class="text-secondary">${plan.branch_name}</span>
                    </div>
                    <div>
                      <span class="text-muted">检查项数：</span>
                      <span class="text-secondary">${totalItems} 项</span>
                    </div>
                  </div>
                  
                  ${task ? `
                    <div class="mt-4 p-3 bg-elevated rounded-lg">
                      <div class="flex items-center justify-between mb-2">
                        <span class="text-sm text-muted">检查进度</span>
                        <span class="text-sm font-mono">${task.completed_items}/${task.total_items}</span>
                      </div>
                      <div class="progress-bar">
                        <div class="progress-fill" style="width: ${task.total_items > 0 ? (task.completed_items / task.total_items * 100).toFixed(0) : 0}%"></div>
                      </div>
                      ${task.problem_items > 0 ? `
                        <div class="mt-2 text-sm text-danger">
                          发现 ${task.problem_items} 项问题
                        </div>
                      ` : ''}
                    </div>
                  ` : ''}
                </div>
                
                <div class="flex flex-col gap-2 flex-shrink-0">
                  ${plan.status === 'pending' ? `
                    <button class="btn btn-primary start-task-btn"
                            data-plan-id="${plan.id}"
                            data-project-name="${escapeAttr(plan.project_name)}"
                            data-supervisor-name="${escapeAttr(plan.supervisor_name)}"
                            data-plan-date="${plan.plan_date}"
                            data-branch-name="${escapeAttr(plan.branch_name)}">
                      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                      </svg>
                      创建并开始检查
                    </button>
                  ` : task ? `
                    <button class="btn ${task.status === 'draft' ? 'btn-primary' : 'btn-secondary'} view-task-btn"
                            data-task-id="${task.id}"
                            data-type="${taskTypeCode}">
                      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        ${task.status === 'draft' ? `
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                        ` : `
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                        `}
                      </svg>
                      ${task.status === 'draft' ? '继续检查' : '查看详情'}
                    </button>
                  ` : ''}
                </div>
              </div>
            </div>
          `;
        }).join('');
        
      } catch (error) {
        console.error('Load tasks error:', error);
        showToast('加载失败：' + error.message, 'error');
      } finally {
        setLoading(false);
      }
    }
    
    // 转义 HTML 属性中的特殊字符
    function escapeAttr(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // 打开创建检查弹窗
    function openStartModal(planId, projectName, supervisorName, planDate, branchName) {
      pendingPlanData = { planId, projectName, supervisorName, planDate, branchName };
      isSubmitting = false;

      document.getElementById('modalProjectName').textContent = projectName;
      document.getElementById('modalSupervisorName').textContent = supervisorName;
      document.getElementById('modalPlanDate').textContent = formatDate(planDate);

      // 根据 branch_name 自动预选公司
      const matched = autoMatchCompany(branchName);
      modalCompanySelect.value = matched || '';
      updateChecklistHint();

      // 显示弹窗
      startTaskModal.classList.add('modal-visible');
    }

    // 关闭弹窗
    function closeStartModal() {
      startTaskModal.classList.remove('modal-visible');
      pendingPlanData = null;
      isSubmitting = false;
      // 重置按钮状态
      confirmStartBtn.disabled = !modalCompanySelect.value;
      confirmStartBtnText.textContent = '创建并开始检查';
    }

    // 根据分公司名称自动匹配公司选项
    function autoMatchCompany(branchName) {
      if (!branchName) return '';
      
      // 精确匹配
      if (COMPANY_CHECKLIST_MAP[branchName]) return branchName;
      
      // 包含匹配（从 select options 中找）
      const options = Array.from(modalCompanySelect.options);
      for (const opt of options) {
        if (!opt.value) continue;
        if (branchName === opt.value) return opt.value;
      }
      for (const opt of options) {
        if (!opt.value) continue;
        if (branchName.includes(opt.value) || opt.value.includes(branchName)) return opt.value;
      }
      
      // 关键词匹配
      if (branchName.includes('输电')) {
        if (branchName.includes('一')) return '输电第一分公司';
        if (branchName.includes('二')) return '输电第二分公司';
        if (branchName.includes('三')) return '输电第三分公司';
        return '输电第一分公司';
      }
      if (branchName.includes('变电')) {
        if (branchName.includes('一')) return '变电第一分公司';
        if (branchName.includes('二')) return '变电第二分公司';
        return '变电第一分公司';
      }
      if (branchName.includes('建筑')) return '建筑分公司';
      if (branchName.includes('调试')) return '调试分公司';
      if (branchName.includes('抢修') || branchName.includes('应急')) return '应急抢修中心';
      
      return '';
    }

    // 更新清单提示
    function updateChecklistHint() {
      const company = modalCompanySelect.value;
      const hint = document.getElementById('modalChecklistHint');
      const hintTitle = document.getElementById('modalChecklistHintTitle');
      const hintDesc = document.getElementById('modalChecklistHintDesc');

      if (!company) {
        hint.classList.add('hidden');
        confirmStartBtn.disabled = true;
        return;
      }

      const info = COMPANY_CHECKLIST_MAP[company];
      if (info) {
        hint.className = `checklist-hint ${info.code === 'transmission' ? 'transmission-hint' : 'substation-hint'}`;
        hint.classList.remove('hidden');
        hintTitle.textContent = `已自动匹配：${info.name}（${info.total}项）`;
        hintDesc.textContent = `${info.code === 'transmission' ? '输电类' : '变电类'}公司，将加载 ${info.total} 项检查清单，适用于${company}`;
        confirmStartBtn.disabled = false;
      } else {
        hint.classList.add('hidden');
        confirmStartBtn.disabled = true;
      }
    }

    // 确认创建检查任务
    async function confirmStartTask() {
      if (isSubmitting) return;
      if (!pendingPlanData) return;

      const company = modalCompanySelect.value;
      if (!company) {
        showToast('请选择所属公司', 'error');
        return;
      }

      const checklistInfo = COMPANY_CHECKLIST_MAP[company];
      if (!checklistInfo) {
        showToast('无法匹配检查清单，请联系管理员', 'error');
        return;
      }

      isSubmitting = true;
      confirmStartBtn.disabled = true;
      confirmStartBtnText.textContent = '创建中...';

      setLoading(true);

      try {
        const { planId, projectName, supervisorName, planDate } = pendingPlanData;

        // 1. 查询对应的 checklist_type_id
        const { data: ctData, error: ctError } = await supabase
          .from('checklist_types')
          .select('id, code, total_items')
          .eq('code', checklistInfo.code)
          .single();

        if (ctError) throw new Error('获取清单类型失败：' + ctError.message);

        const checklistTypeId = ctData.id;
        const totalItems = ctData.total_items || checklistInfo.total;

        // 2. 生成任务编号
        const { data: taskNumber, error: tnError } = await supabase.rpc('generate_task_number');
        if (tnError) throw new Error('生成任务编号失败：' + tnError.message);

        // 3. 创建检查任务
        const { data: task, error: taskError } = await supabase
          .from('inspection_tasks')
          .insert({
            task_number: taskNumber,
            inspector_name: supervisorName,
            company_name: company,
            project_name: projectName,
            inspection_date: planDate,
            created_by: currentUser.id,
            status: 'draft',
            total_items: totalItems,
            checklist_type_id: checklistTypeId
          })
          .select('id')
          .single();

        if (taskError) throw new Error('创建检查任务失败：' + taskError.message);
        if (!task || !task.id) throw new Error('创建任务后未能获取任务ID，请重试');

        // 4. 更新日计划状态（忽略 RLS 导致的更新失败，不阻塞主流程）
        await supabase
          .from('daily_plans')
          .update({
            status: 'in_progress',
            task_id: task.id
          })
          .eq('id', planId);

        showToast('检查任务已创建，正在跳转...');
        startTaskModal.classList.remove('modal-visible');

        // 5. 跳转到检查页面
        setTimeout(() => {
          window.location.href = `./inspection.html?id=${task.id}&type=${checklistInfo.code}`;
        }, 500);

      } catch (error) {
        console.error('Start task error:', error);
        showToast(error.message || '创建任务失败，请重试', 'error');
        isSubmitting = false;
        confirmStartBtn.disabled = false;
        confirmStartBtnText.textContent = '创建并开始检查';
      } finally {
        setLoading(false);
      }
    }
    
    // 查看任务
    function viewTask(taskId, checklistTypeCode) {
      const typeParam = checklistTypeCode ? `&type=${checklistTypeCode}` : '';
      window.location.href = `./inspection.html?id=${taskId}${typeParam}`;
    }
    
    // 设置事件监听
    function setupEventListeners() {
      // 日期变化
      dateInput.addEventListener('change', async (e) => {
        selectedDate = e.target.value;
        selectedSupervisor = isManager ? null : currentUser.profile?.display_name;
        
        if (isManager) {
          document.getElementById('clearSelection').classList.add('hidden');
          document.getElementById('selectedSupervisorInfo').classList.add('hidden');
          await loadSupervisors();
        } else {
          await loadTasks();
        }
      });

      // 日期导航按钮
      document.getElementById('prevDateBtn').addEventListener('click', () => changeDate(-1));
      document.getElementById('nextDateBtn').addEventListener('click', () => changeDate(1));

      // 负责人列表点击（事件委托）
      supervisorListEl.addEventListener('click', async (e) => {
        const chip = e.target.closest('.supervisor-chip');
        if (!chip) return;
        const name = chip.dataset.name;
        if (!name) return;
        
        selectedSupervisor = name;
        document.querySelectorAll('.supervisor-chip').forEach(c => {
          c.classList.toggle('selected', c.dataset.name === name);
        });
        document.getElementById('clearSelection').classList.remove('hidden');
        await loadTasks();
      });

      // 清除选择
      document.getElementById('clearSelection').addEventListener('click', () => {
        selectedSupervisor = null;
        document.querySelectorAll('.supervisor-chip').forEach(c => c.classList.remove('selected'));
        document.getElementById('clearSelection').classList.add('hidden');
        document.getElementById('selectedSupervisorInfo').classList.add('hidden');
        taskList.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">
              <svg class="w-16 h-16 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
              </svg>
            </div>
            <h3 class="text-xl font-semibold mb-2">请选择工作负责人</h3>
            <p class="text-secondary">点击上方的姓名查看该负责人的检查任务</p>
          </div>
        `;
      });

      // 任务列表点击（事件委托）
      taskList.addEventListener('click', (e) => {
        // 开始检查按钮
        const startBtn = e.target.closest('.start-task-btn');
        if (startBtn) {
          const { planId, projectName, supervisorName, planDate, branchName } = startBtn.dataset;
          openStartModal(planId, projectName, supervisorName, planDate, branchName);
          return;
        }
        // 查看任务按钮
        const viewBtn = e.target.closest('.view-task-btn');
        if (viewBtn) {
          viewTask(viewBtn.dataset.taskId, viewBtn.dataset.type);
          return;
        }
      });

      // 弹窗关闭按钮
      document.getElementById('closeModalBtn').addEventListener('click', closeStartModal);
      document.getElementById('cancelModalBtn').addEventListener('click', closeStartModal);

      // 点击弹窗背景关闭（仅点击背景层，不影响内部元素）
      startTaskModal.addEventListener('click', (e) => {
        if (e.target === startTaskModal) closeStartModal();
      });

      // 公司选择变化
      modalCompanySelect.addEventListener('change', updateChecklistHint);

      // 确认按钮
      confirmStartBtn.addEventListener('click', confirmStartTask);
    }
    
    // 切换日期
    function changeDate(days) {
      const date = new Date(selectedDate);
      date.setDate(date.getDate() + days);
      selectedDate = date.toISOString().split('T')[0];
      dateInput.value = selectedDate;
      
      selectedSupervisor = isManager ? null : currentUser.profile?.display_name;
      
      if (isManager) {
        document.getElementById('clearSelection').classList.add('hidden');
        document.getElementById('selectedSupervisorInfo').classList.add('hidden');
        loadSupervisors();
      } else {
        loadTasks();
      }
    }
    
    // 返回
    window.goBack = function() {
      window.location.href = './home.html';
    };
    
    // 辅助函数
    function getStatusText(status) {
      const map = {
        'pending': '待执行',
        'in_progress': '进行中',
        'completed': '已完成',
        'cancelled': '已取消'
      };
      return map[status] || status;
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 ${weekDays[date.getDay()]}`;
    }
    
    // Toast
    window.showToast = function(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        <span>${type === 'success' ? '✓' : type === 'error' ? '✗' : '⚠'}</span>
        <span>${message}</span>
      `;
      toastContainer.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    };
    
    // Loading
    window.setLoading = function(show) {
      loadingOverlay.classList.toggle('hidden', !show);
    };
  </script>
</body>
</html>
