  <style data-node-id="b7533ffa-29b2-11f1-be13-122a9cb60781">
    .item-card {
      background: var(--bg-card);

    /* 照片上传区域 - 每项都显示 */
    .photo-upload-area {
      margin-top: 0.75rem;

      background: var(--bg-elevated);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;

    }

    .evidence-thumb {
      width: 64px; height: 64px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;

    .evidence-thumb img, .evidence-thumb video {
      width: 100%; height: 100%; object-fit: cover;

    .evidence-thumb .del-btn {
      position: absolute; top: 2px; right: 2px;

    .filter-tabs {

    .lightbox {

  <script type="module" data-node-id="b7533ce4-29b2-11f1-be13-122a9cb60781">
    import { supabase, SUPABASE_URL } from './js/supabase.js';
    import { checkAuth, getCurrentUser } from './js/auth.js';

    // 全局状态
    let currentUser = null;
    let taskId = null;
    let task = null;
    let checklistTypeCode = 'transmission';
    let categories = [];
    let items = [];
    let results = {}; // item_id -> result
    let currentFilter = 'all';
    let savingItems = new Set(); // 防止重复保存
    let uploadingItems = new Set(); // 防止重复上传

    const SUPABASE_STORAGE_URL = SUPABASE_URL + '/storage/v1/object/public/evidence-files/';

    // DOM
    const loadingOverlay = document.getElementById('loadingOverlay');
    const toastContainer = document.getElementById('toastContainer');

    async function init() {
      const session = await checkAuth();
      if (!session) { window.location.href = './index.html'; return; }

      currentUser = await getCurrentUser();
      if (!currentUser) { window.location.href = './index.html'; return; }

      const urlParams = new URLSearchParams(window.location.search);
      taskId = urlParams.get('id');
      const urlType = urlParams.get('type');
      if (urlType) checklistTypeCode = urlType;

      if (!taskId) {
        showToast('无效的任务ID', 'error');
        setTimeout(() => window.location.href = './home.html', 1500);
        return;
      }

      setLoading(true);
      try {
        await loadTask();
        await loadChecklistItems();
        await loadResults();
        renderAll();
        setupSubmitBtn();
        setupFilterTabs();
      } catch (err) {
        console.error('Init error:', err);
        showToast('加载失败：' + (err.message || '未知错误'), 'error');
      } finally {
        setLoading(false);
      }
    }

    init();

    // 加载任务信息
    async function loadTask() {
      const { data, error } = await supabase
        .from('inspection_tasks')
        .select('*, checklist_types(name, code, total_items)')
        .eq('id', taskId)
        .single();

      if (error) {
        console.error('loadTask error:', error);
        throw new Error('任务不存在或无权访问（错误码：' + error.code + '）');
      }
      if (!data) throw new Error('任务不存在');
      task = data;

      // 优先从任务关联的 checklist_types 确定类型
      if (task.checklist_types && task.checklist_types.code) {
        checklistTypeCode = task.checklist_types.code;
      } else if (task.company_name) {
        checklistTypeCode = task.company_name.includes('输电') ? 'transmission' : 'substation';
      }

      document.getElementById('taskNumberNav').textContent = task.task_number;
      document.getElementById('infoInspector').textContent = task.inspector_name;
      document.getElementById('infoCompany').textContent = task.company_name;
      document.getElementById('infoProject').textContent = task.project_name;
      document.getElementById('infoDate').textContent = formatDate(task.inspection_date);

      const typeName = task.checklist_types?.name || (checklistTypeCode === 'transmission' ? '输电组塔施工违章预判清单(60项)' : '变电工程违章预判清单(33项)');
      document.getElementById('checklistTypeBadge').textContent = typeName;

      const statusMap = { draft: '草稿', submitted: '待审核', approved: '已通过', rejected: '已退回', archived: '已归档' };
      const statusBadgeClass = { draft: 'badge-warning', submitted: 'badge-info', approved: 'badge-success', rejected: 'badge-danger', archived: 'badge-success' };
      const statusBadge = document.getElementById('taskStatusBadge');
      statusBadge.textContent = statusMap[task.status] || task.status;
      statusBadge.className = `badge ${statusBadgeClass[task.status] || 'badge-muted'} text-xs`;
    }

    // 加载检查项（根据清单类型）
    async function loadChecklistItems() {
      try {
        if (checklistTypeCode === 'substation') {
          const [catsRes, itsRes] = await Promise.all([
            supabase.from('substation_categories').select('*').order('sort_order'),
            supabase.from('substation_items').select('*').order('sequence_number')
          ]);
          if (catsRes.error) console.warn('substation_categories error:', catsRes.error);
          if (itsRes.error) console.warn('substation_items error:', itsRes.error);
          categories = catsRes.data || [];
          items = itsRes.data || [];
        } else {
          const [catsRes, itsRes] = await Promise.all([
            supabase.from('inspection_categories').select('*').order('sort_order'),
            supabase.from('inspection_items').select('*').order('sequence_number')
          ]);
          if (catsRes.error) console.warn('inspection_categories error:', catsRes.error);
          if (itsRes.error) console.warn('inspection_items error:', itsRes.error);
          categories = catsRes.data || [];
          items = itsRes.data || [];
        }

        if (items.length === 0) {
          console.warn('清单项为空，类型：', checklistTypeCode);
          showToast('警告：未找到检查清单项目，请联系管理员', 'warning');
        }
      } catch (err) {
        console.error('loadChecklistItems error:', err);
        categories = [];
        items = [];
      }
    }

    // 加载已有检查结果（不 join evidence_files，避免 RLS 问题）
    async function loadResults() {
      const { data: resultsData, error: resultsError } = await supabase
        .from('inspection_results')
        .select('id, task_id, item_id, status, rectification_measure, rectification_date, created_at, updated_at')
        .eq('task_id', taskId);

      if (resultsError) {
        console.error('loadResults error:', resultsError);
        results = {};
        return;
      }

      results = {};
      (resultsData || []).forEach(r => {
        results[r.item_id] = { ...r, evidence_files: [] };
      });

      // 分批加载 evidence_files（避免 RLS 联表问题）
      const resultIds = Object.values(results).map(r => r.id);
      if (resultIds.length > 0) {
        const { data: evData, error: evError } = await supabase
          .from('evidence_files')
          .select('id, result_id, file_name, file_type, file_size, storage_path, created_at')
          .in('result_id', resultIds);

        if (!evError && evData) {
          evData.forEach(ev => {
            // 找到对应的 result
            const result = Object.values(results).find(r => r.id === ev.result_id);
            if (result) {
              result.evidence_files.push(ev);
            }
          });
        } else if (evError) {
          console.warn('loadEvidenceFiles error:', evError);
        }
      }

      console.log('已加载检查结果：', Object.keys(results).length, '条');
    }

    // 渲染所有内容
    function renderAll() {
      updateProgress();
      renderItems();
    }

    // 更新进度
    function updateProgress() {
      const total = items.length;
      const checked = Object.keys(results).length;
      const pct = total > 0 ? Math.round(checked / total * 100) : 0;
      document.getElementById('progressText').textContent = `已检查 ${checked} 项，共 ${total} 项`;
      document.getElementById('progressCount').textContent = `${pct}%`;
      document.getElementById('progressBar').style.width = pct + '%';
    }

    // 渲染检查项列表
    function renderItems() {
      const container = document.getElementById('itemsList');
      const isSubstation = checklistTypeCode === 'substation';
      const isDraft = task.status === 'draft';

      let filteredItems = items;
      if (currentFilter === 'unchecked') {
        filteredItems = items.filter(item => !results[item.id]);
      } else if (currentFilter !== 'all') {
        filteredItems = items.filter(item => results[item.id]?.status === currentFilter);
      }

      if (filteredItems.length === 0) {
        container.innerHTML = `<div class="text-center text-muted py-12">
          <svg class="w-12 h-12 mx-auto mb-3 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
          </svg>
          <p>暂无符合条件的检查项</p>
        </div>`;
        return;
      }

      let html = '';
      let lastCatId = null;

      filteredItems.forEach(item => {
        const cat = categories.find(c => c.id === item.category_id);
        const result = results[item.id];
        const status = result?.status || '';
        const evidenceFiles = result?.evidence_files || [];

        if (item.category_id !== lastCatId) {
          lastCatId = item.category_id;
          html += `
            <div class="category-header ${isSubstation ? 'substation-cat' : ''}">
              <span class="text-lg">${isSubstation ? '🔌' : '⚡'}</span>
              <span class="font-semibold">${cat?.name || '其他'}</span>
              <span class="ml-auto text-xs text-muted">${isSubstation ? '变电工程' : '输电组塔'}</span>
            </div>
          `;
        }

        const statusClass = status ? `status-${status}` : '';

        html += `
          <div class="item-card ${statusClass} mb-3" id="item-card-${item.id}">
            <div class="flex items-start gap-3">
              <span class="font-mono text-primary font-bold text-sm flex-shrink-0 mt-0.5">${item.sequence_number}</span>
              <div class="flex-1 min-w-0">
                <h4 class="font-medium text-sm mb-1">${item.violation_content}</h4>
                <p class="text-xs text-secondary mb-3">${item.inspection_points}</p>

                <!-- 操作按钮 -->
                ${isDraft ? `
                  <div class="flex flex-wrap gap-2 mb-2">
                    <button class="result-btn pass ${status === 'pass' ? 'active' : ''}"
                            data-item-id="${item.id}" data-action="pass">✓ 无问题</button>
                    <button class="result-btn na ${status === 'not_applicable' ? 'active' : ''}"
                            data-item-id="${item.id}" data-action="not_applicable">○ 不涉及</button>
                    <button class="result-btn problem ${status === 'problem' ? 'active' : ''}"
                            data-item-id="${item.id}" data-action="problem">✗ 有问题</button>
                  </div>
                ` : `
                  <div class="mb-2">
                    ${status === 'pass' ? '<span class="badge badge-success text-xs">✓ 无问题</span>' :
                      status === 'not_applicable' ? '<span class="badge badge-muted text-xs">○ 不涉及</span>' :
                      status === 'problem' ? '<span class="badge badge-danger text-xs">✗ 有问题</span>' :
                      status === 'rectified' ? '<span class="badge badge-info text-xs">已整改</span>' :
                      '<span class="badge badge-muted text-xs">未检查</span>'}
                  </div>
                `}

                <!-- 问题整改面板（仅有问题/已整改时显示） -->
                ${(status === 'problem' || status === 'rectified') ? `
                  <div class="rectify-panel" id="rectify-${item.id}">
                    ${isDraft ? `
                      <div class="form-group mb-2">
                        <label class="form-label text-xs">整改措施</label>
                        <textarea id="measure-${item.id}" class="form-input text-sm" rows="2"
                                  placeholder="请描述整改措施..."
                                  data-item-id="${item.id}" data-type="measure">${result?.rectification_measure || ''}</textarea>
                      </div>
                      <div class="form-group mb-2">
                        <label class="form-label text-xs">整改日期</label>
                        <input type="date" id="date-${item.id}" class="form-input text-sm"
                               value="${result?.rectification_date || ''}"
                               data-item-id="${item.id}" data-type="date">
                      </div>
                      ${status === 'problem' ? `
                        <div class="mb-2">
                          <button class="result-btn pass text-xs" data-item-id="${item.id}" data-action="rectified">
                            标记已整改
                          </button>
                        </div>
                      ` : ''}
                    ` : `
                      <p class="text-xs text-secondary">整改措施：${result?.rectification_measure || '-'}</p>
                      ${result?.rectification_date ? `<p class="text-xs text-secondary mt-1">整改日期：${formatDate(result.rectification_date)}</p>` : ''}
                    `}
                  </div>
                ` : ''}

                <!-- ★ 照片/视频上传区域（每项都显示，草稿状态可上传） -->
                ${result ? `
                  <div class="photo-upload-area" id="photo-area-${item.id}">
                    <div class="flex items-center justify-between mb-2">
                      <span class="text-xs text-muted font-medium">📷 现场照片/视频</span>
                      <span id="upload-count-${item.id}" class="text-xs text-muted">${evidenceFiles.length > 0 ? evidenceFiles.length + ' 个文件' : ''}</span>
                    </div>
                    <!-- 已上传文件缩略图 -->
                    <div class="flex flex-wrap gap-2 mb-2" id="evidence-${item.id}">
                      ${evidenceFiles.map(f => `
                        <div class="evidence-thumb" data-url="${SUPABASE_STORAGE_URL}${f.storage_path}" data-type="${f.file_type}">
                          ${f.file_type === 'image'
                            ? `<img src="${SUPABASE_STORAGE_URL}${f.storage_path}" alt="${f.file_name}" loading="lazy">`
                            : `<video><source src="${SUPABASE_STORAGE_URL}${f.storage_path}"></video>`}
                          ${isDraft ? `<div class="del-btn" data-file-id="${f.id}" data-item-id="${item.id}">×</div>` : ''}
                        </div>
                      `).join('')}
                    </div>
                    <!-- 上传按钮 -->
                    ${isDraft ? `
                      <div class="flex items-center gap-2">
                        <label class="upload-btn" for="file-${item.id}" id="upload-label-${item.id}">
                          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                          </svg>
                          上传照片/视频
                        </label>
                        <input type="file" id="file-${item.id}" accept="image/*,video/*" capture="environment" class="hidden"
                               data-item-id="${item.id}">
                        <span id="uploading-${item.id}" class="hidden text-xs text-muted">
                          <span class="uploading-spinner"></span> 上传中...
                        </span>
                      </div>
                    ` : ''}
                  </div>
                ` : `
                  <!-- 未检查时提示先标记结果才能上传 -->
                  ${isDraft ? `
                    <div class="mt-2 text-xs text-muted opacity-60">
                      💡 请先标记检查结果，再上传照片/视频
                    </div>
                  ` : ''}
                `}
              </div>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
      bindItemEvents(container);
    }

    // 使用事件委托绑定检查项事件
    function bindItemEvents(container) {
      // 先移除旧的事件监听（通过替换节点）
      const newContainer = container.cloneNode(true);
      container.parentNode.replaceChild(newContainer, container);
      const itemsList = document.getElementById('itemsList');

      // 结果按钮点击
      itemsList.addEventListener('click', async (e) => {
        // 结果按钮
        const resultBtn = e.target.closest('[data-action]');
        if (resultBtn && resultBtn.dataset.itemId && !resultBtn.disabled) {
          const itemId = resultBtn.dataset.itemId;
          const action = resultBtn.dataset.action;
          await setResult(itemId, action);
          return;
        }

        // 证据缩略图点击（查看）
        const thumb = e.target.closest('.evidence-thumb');
        if (thumb && !e.target.closest('.del-btn')) {
          const url = thumb.dataset.url;
          const type = thumb.dataset.type;
          if (url) openLightbox(url, type);
          return;
        }

        // 删除证据按钮
        const delBtn = e.target.closest('.del-btn');
        if (delBtn) {
          e.stopPropagation();
          const fileId = delBtn.dataset.fileId;
          const itemId = delBtn.dataset.itemId;
          if (fileId && itemId) await deleteEvidence(fileId, itemId);
          return;
        }
      });

      // 整改信息输入（失焦保存）
      itemsList.addEventListener('blur', async (e) => {
        const el = e.target;
        if (el.dataset.type === 'measure' || el.dataset.type === 'date') {
          await saveRectification(el.dataset.itemId);
        }
      }, true);

      // 文件上传
      itemsList.addEventListener('change', async (e) => {
        const input = e.target;
        if (input.type === 'file' && input.dataset.itemId) {
          if (input.files && input.files.length > 0) {
            await uploadEvidence(input.dataset.itemId, input);
          }
        }
      });
    }

    // 设置筛选标签（只绑定一次）
    function setupFilterTabs() {
      document.getElementById('filterTabsContainer').addEventListener('click', (e) => {
        const tab = e.target.closest('.filter-tab');
        if (!tab) return;
        currentFilter = tab.dataset.filter;
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderItems();
      });
    }

    // ★ 核心修复：设置检查结果
    // 修复方案：INSERT/UPDATE 后手动构建结果对象，不依赖 SELECT 返回（避免 evidence_files RLS 问题）
    async function setResult(itemId, status) {
      if (task.status !== 'draft') return;
      if (savingItems.has(itemId)) return;
      savingItems.add(itemId);

      // 立即更新 UI 按钮状态（乐观更新）
      const card = document.getElementById('item-card-' + itemId);
      if (card) {
        card.querySelectorAll('[data-action]').forEach(btn => {
          btn.disabled = true;
        });
      }

      showAutoSaveStatus('保存中...');

      try {
        const existing = results[itemId];
        let savedData;

        if (existing) {
          // 更新已有结果
          const { error } = await supabase
            .from('inspection_results')
            .update({ status, updated_at: new Date().toISOString() })
            .eq('id', existing.id);

          if (error) {
            console.error('UPDATE inspection_results error:', error);
            throw new Error('更新失败：' + (error.message || error.code));
          }

          // 手动构建更新后的对象（保留已有 evidence_files）
          savedData = {
            ...existing,
            status,
            updated_at: new Date().toISOString()
          };
        } else {
          // 插入新结果
          const { data, error } = await supabase
            .from('inspection_results')
            .insert({ task_id: taskId, item_id: itemId, status })
            .select('id, task_id, item_id, status, rectification_measure, rectification_date, created_at, updated_at')
            .single();

          if (error) {
            console.error('INSERT inspection_results error:', error);
            let errMsg = '保存失败';
            if (error.code === '42501') errMsg = '权限不足，请重新登录后重试';
            else if (error.code === '23503') errMsg = '数据关联错误（外键约束），请联系管理员';
            else if (error.code === '23505') errMsg = '记录已存在，请刷新页面重试';
            else if (error.message) errMsg = error.message;
            throw new Error(errMsg);
          }

          // 新记录没有 evidence_files
          savedData = { ...data, evidence_files: [] };
        }

        // 更新本地状态
        results[itemId] = savedData;

        // 更新任务统计
        await updateTaskStats();
        updateProgress();
        renderItems();

        showAutoSaveStatus('已自动保存 ✓');

      } catch (err) {
        console.error('setResult error:', err);
        showToast(err.message || '保存失败，请重试', 'error');

        // 恢复按钮状态
        if (card) {
          card.querySelectorAll('[data-action]').forEach(btn => {
            btn.disabled = false;
          });
        }
        showAutoSaveStatus('');
      } finally {
        savingItems.delete(itemId);
      }
    }

    // 显示自动保存状态
    function showAutoSaveStatus(msg) {
      const el = document.getElementById('autoSaveStatus');
      if (!el) return;
      if (msg) {
        el.textContent = msg;
        el.classList.remove('hidden');
      } else {
        el.classList.add('hidden');
      }
    }

    // 保存整改信息
    async function saveRectification(itemId) {
      if (task.status !== 'draft') return;
      const result = results[itemId];
      if (!result) return;

      const measure = document.getElementById('measure-' + itemId)?.value || '';
      const date = document.getElementById('date-' + itemId)?.value || null;

      try {
        const { error } = await supabase
          .from('inspection_results')
          .update({
            rectification_measure: measure,
            rectification_date: date || null,
            updated_at: new Date().toISOString()
          })
          .eq('id', result.id);

        if (error) throw error;
        results[itemId].rectification_measure = measure;
        results[itemId].rectification_date = date;
        showAutoSaveStatus('已自动保存 ✓');
      } catch (err) {
        console.error('saveRectification error:', err);
        showToast('保存整改信息失败：' + (err.message || '未知错误'), 'error');
      }
    }

    // ★ 修复：上传证据文件（每项都可上传，不限于有问题的项）
    async function uploadEvidence(itemId, input) {
      if (!input.files || input.files.length === 0) return;
      const file = input.files[0];
      const result = results[itemId];

      if (!result) {
        showToast('请先标记检查结果（无问题/不涉及/有问题），再上传照片', 'warning');
        input.value = '';
        return;
      }

      if (uploadingItems.has(itemId)) {
        showToast('正在上传中，请稍候', 'warning');
        return;
      }

      uploadingItems.add(itemId);

      // 显示上传中状态
      const uploadLabel = document.getElementById('upload-label-' + itemId);
      const uploadingIndicator = document.getElementById('uploading-' + itemId);
      if (uploadLabel) uploadLabel.style.display = 'none';
      if (uploadingIndicator) uploadingIndicator.classList.remove('hidden');

      try {
        const ext = file.name.split('.').pop().toLowerCase();
        const path = `${taskId}/${itemId}/${Date.now()}.${ext}`;
        const fileType = file.type.startsWith('video/') ? 'video' : 'image';

        // 上传到 Storage
        const { error: uploadError } = await supabase.storage
          .from('evidence-files')
          .upload(path, file, { upsert: false });

        if (uploadError) {
          console.error('Storage upload error:', uploadError);
          throw new Error('文件上传失败：' + (uploadError.message || '存储错误'));
        }

        // 写入 evidence_files 表
        const { data: evData, error: evError } = await supabase
          .from('evidence_files')
          .insert({
            result_id: result.id,
            file_name: file.name,
            file_type: fileType,
            file_size: file.size,
            storage_path: path
          })
          .select('id, result_id, file_name, file_type, file_size, storage_path, created_at')
          .single();

        if (evError) {
          console.error('evidence_files insert error:', evError);
          // 尝试删除已上传的文件
          await supabase.storage.from('evidence-files').remove([path]);
          throw new Error('记录保存失败：' + (evError.message || evError.code));
        }

        // 更新本地状态
        if (!results[itemId].evidence_files) results[itemId].evidence_files = [];
        results[itemId].evidence_files.push(evData);

        // 动态更新 UI（不重新渲染整个列表）
        const evidenceContainer = document.getElementById('evidence-' + itemId);
        if (evidenceContainer) {
          const thumb = document.createElement('div');
          thumb.className = 'evidence-thumb';
          thumb.dataset.url = SUPABASE_STORAGE_URL + path;
          thumb.dataset.type = fileType;
          if (fileType === 'image') {
            thumb.innerHTML = `<img src="${SUPABASE_STORAGE_URL}${path}" alt="${file.name}" loading="lazy"><div class="del-btn" data-file-id="${evData.id}" data-item-id="${itemId}">×</div>`;
          } else {
            thumb.innerHTML = `<video><source src="${SUPABASE_STORAGE_URL}${path}"></video><div class="del-btn" data-file-id="${evData.id}" data-item-id="${itemId}">×</div>`;
          }
          evidenceContainer.appendChild(thumb);
        }

        // 更新文件计数
        const countEl = document.getElementById('upload-count-' + itemId);
        if (countEl) {
          const count = results[itemId].evidence_files.length;
          countEl.textContent = count > 0 ? count + ' 个文件' : '';
        }

        showToast('照片上传成功 ✓');
        input.value = '';

      } catch (err) {
        console.error('uploadEvidence error:', err);
        showToast('上传失败：' + (err.message || '未知错误'), 'error');
        input.value = '';
      } finally {
        uploadingItems.delete(itemId);
        // 恢复上传按钮
        if (uploadLabel) uploadLabel.style.display = '';
        if (uploadingIndicator) uploadingIndicator.classList.add('hidden');
      }
    }

    // 删除证据文件
    async function deleteEvidence(fileId, itemId) {
      if (!confirm('确定要删除此证据文件吗？')) return;
      try {
        // 找到文件信息
        const fileInfo = results[itemId]?.evidence_files?.find(f => f.id === fileId);

        const { error } = await supabase.from('evidence_files').delete().eq('id', fileId);
        if (error) throw error;

        // 尝试从 Storage 删除（可选，不影响主流程）
        if (fileInfo?.storage_path) {
          await supabase.storage.from('evidence-files').remove([fileInfo.storage_path]);
        }

        if (results[itemId]?.evidence_files) {
          results[itemId].evidence_files = results[itemId].evidence_files.filter(f => f.id !== fileId);
        }

        // 局部更新 UI
        const thumb = document.querySelector(`.del-btn[data-file-id="${fileId}"]`)?.closest('.evidence-thumb');
        if (thumb) thumb.remove();

        // 更新文件计数
        const countEl = document.getElementById('upload-count-' + itemId);
        if (countEl) {
          const count = results[itemId]?.evidence_files?.length || 0;
          countEl.textContent = count > 0 ? count + ' 个文件' : '';
        }

        showToast('已删除');
      } catch (err) {
        showToast('删除失败：' + (err.message || '未知错误'), 'error');
      }
    }

    // 更新任务统计
    async function updateTaskStats() {
      const completed = Object.keys(results).length;
      const problems = Object.values(results).filter(r => r.status === 'problem').length;

      const { error } = await supabase
        .from('inspection_tasks')
        .update({
          completed_items: completed,
          problem_items: problems,
          updated_at: new Date().toISOString()
        })
        .eq('id', taskId);

      if (error) console.warn('updateTaskStats error:', error);

      task.completed_items = completed;
      task.problem_items = problems;
    }

    // 设置提交按钮
    function setupSubmitBtn() {
      const btn = document.getElementById('submitBtn');
      if (task.status !== 'draft') return;
      btn.classList.remove('hidden');

      btn.addEventListener('click', async () => {
        const total = items.length;
        const checked = Object.keys(results).length;

        if (checked < total) {
          if (!confirm(`还有 ${total - checked} 项未检查，确定要提交审核吗？`)) return;
        } else {
          if (!confirm('确定要提交审核吗？提交后将无法修改。')) return;
        }

        setLoading(true);
        try {
          const { error } = await supabase
            .from('inspection_tasks')
            .update({ status: 'submitted', updated_at: new Date().toISOString() })
            .eq('id', taskId);

          if (error) throw error;

          await supabase.from('operation_logs').insert({
            task_id: taskId,
            operator_name: currentUser.profile?.display_name || currentUser.email,
            operation_type: 'submit',
            operation_detail: '提交审核'
          });

          showToast('已提交审核');
          setTimeout(() => window.location.href = './home.html', 1500);
        } catch (err) {
          showToast('提交失败：' + (err.message || '未知错误'), 'error');
        } finally {
          setLoading(false);
        }
      });
    }

    // 返回
    window.goBack = function() {
      window.history.back();
    };

    // 灯箱
    window.openLightbox = function(url, type) {
      const lb = document.getElementById('lightbox');
      const content = document.getElementById('lightboxContent');
      content.innerHTML = type === 'image'
        ? `<img src="${url}" alt="预览">`
        : `<video controls autoplay><source src="${url}"></video>`;
      lb.classList.remove('hidden');
    };
    window.closeLightbox = function() {
      document.getElementById('lightbox').classList.add('hidden');
      document.getElementById('lightboxContent').innerHTML = '';
    };

    // 辅助函数
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    window.showToast = function(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `<span>${type === 'success' ? '✓' : type === 'error' ? '✗' : '⚠'}</span><span>${message}</span>`;
      toastContainer.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
      }, type === 'error' ? 5000 : 3000);
    };

    window.setLoading = function(show) {
      loadingOverlay.classList.toggle('hidden', !show);
    };
  </script>
</body>
</html>
