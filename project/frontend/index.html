  <script type="module" data-node-id="b752c58e-29b2-11f1-be13-122a9cb60781">
    import { supabase } from './js/supabase.js';
    import { signIn, signUp, validateUsername, checkAuth } from './js/auth.js';
    
    // 检查是否已登录
    checkAuth().then(session => {
      if (session) {
        window.location.href = './home.html';
      }
    });
    
    // DOM 元素
    const tabBtns = document.querySelectorAll('.tab-btn');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const regUsername = document.getElementById('regUsername');
    const usernameHint = document.getElementById('usernameHint');
    const regCompany = document.getElementById('regCompany');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const toastContainer = document.getElementById('toastContainer');
    
    // 角色选择
    const roleOptions = document.querySelectorAll('.role-option');
    roleOptions.forEach(option => {
      option.addEventListener('click', () => {
        roleOptions.forEach(o => o.classList.remove('selected'));
        option.classList.add('selected');
        option.querySelector('input').checked = true;
      });
    });
    
    // 标签页切换
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        if (btn.dataset.tab === 'login') {
          loginForm.classList.remove('hidden');
          registerForm.classList.add('hidden');
        } else {
          loginForm.classList.add('hidden');
          registerForm.classList.remove('hidden');
        }
      });
    });
    
    // 加载公司列表
    async function loadCompanies() {
      const { data, error } = await supabase
        .from('companies')
        .select('*')
        .order('sort_order');
      
      if (data && data.length > 0) {
        data.forEach(company => {
          const option = document.createElement('option');
          option.value = company.name;
          option.textContent = company.name;
          regCompany.appendChild(option);
        });
      } else {
        // 如果没有预设数据，添加默认选项
        const defaultCompanies = [
          '国网四川电力送变电建设有限公司',
          '国网四川省电力公司建设分公司',
          '四川电力建设有限公司',
          '四川送变电工程有限公司',
          '其他单位'
        ];
        defaultCompanies.forEach(name => {
          const option = document.createElement('option');
          option.value = name;
          option.textContent = name;
          regCompany.appendChild(option);
        });
      }
    }
    
    loadCompanies();
    
    // 用户名验证
    regUsername.addEventListener('input', () => {
      const value = regUsername.value;
      if (!value) {
        usernameHint.textContent = '3-20位字母、数字、下划线或连字符';
        usernameHint.className = 'validation-hint';
      } else if (!validateUsername(value)) {
        usernameHint.textContent = '格式不正确：仅支持字母、数字、下划线、连字符，3-20位';
        usernameHint.className = 'validation-hint validation-error';
      } else {
        usernameHint.textContent = '✓ 格式正确';
        usernameHint.className = 'validation-hint validation-success';
      }
    });
    
    // 显示 Toast
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        <span>${type === 'success' ? '✓' : type === 'error' ? '✕' : '⚠'}</span>
        <span>${message}</span>
      `;
      toastContainer.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
    
    // 显示/隐藏加载
    function setLoading(show) {
      loadingOverlay.classList.toggle('hidden', !show);
    }
    
    // 登录处理
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      
      if (!validateUsername(username)) {
        showToast('用户名格式不正确', 'error');
        return;
      }
      
      setLoading(true);
      
      try {
        await signIn(username, password);
        showToast('登录成功，正在跳转...');
        setTimeout(() => {
          window.location.href = './home.html';
        }, 500);
      } catch (error) {
        console.error('Login error:', error);
        showToast(error.message || '登录失败，请检查用户名和密码', 'error');
      } finally {
        setLoading(false);
      }
    });
    
    // 注册处理
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = regUsername.value.trim();
      const displayName = document.getElementById('regDisplayName').value.trim();
      const company = regCompany.value;
      const password = document.getElementById('regPassword').value;
      const confirmPassword = document.getElementById('regConfirmPassword').value;
      const roleType = document.querySelector('input[name="roleType"]:checked').value;
      
      if (!validateUsername(username)) {
        showToast('用户名格式不正确', 'error');
        return;
      }
      
      if (password !== confirmPassword) {
        showToast('两次输入的密码不一致', 'error');
        return;
      }
      
      if (password.length < 6) {
        showToast('密码长度至少6位', 'error');
        return;
      }
      
      setLoading(true);
      
      try {
        await signUp(username, password, displayName, company, roleType);
        showToast('注册成功，正在跳转...');
        setTimeout(() => {
          window.location.href = './home.html';
        }, 500);
      } catch (error) {
        console.error('Register error:', error);
        if (error.message.includes('already registered')) {
          showToast('该用户名已被注册', 'error');
        } else {
          showToast(error.message || '注册失败，请稍后重试', 'error');
        }
      } finally {
        setLoading(false);
      }
    });
  </script>
